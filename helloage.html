<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸年龄检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7a43d0, #1fb25e, #1a6c22);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3),
            0 5px 15px rgba(0, 0, 0, 0.2);
            width: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            opacity: 0.3;
            animation: pulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border-radius: 2px;
        }

        .camera-container {
            position: relative;
            margin: 2rem 0;
            width: 700px;
            height: 380px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .camera-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4facfe, #00f2fe, #4facfe);
            background-size: 200% 100%;
            animation: scan 3s linear infinite;
            z-index: 2;
        }

        @keyframes scan {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .camera-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(79, 172, 254, 0.1) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: scanLines 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes scanLines {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .status {
            margin-top: 2rem;
            font-size: 1.2rem;
            min-height: 2.5rem;
            transition: all 0.3s ease;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .status::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .status.success {
            color: #4caf50;
            font-weight: bold;
            background: rgba(76, 175, 80, 0.2);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .status.warning {
            color: #ff9800;
            background: rgba(255, 152, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
        }

        .instructions {
            margin-top: 2rem;
            font-size: 1rem;
            color: #e0e0e0;
            line-height: 1.8;
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            border-left: 4px solid #4facfe;
        }

        .instructions p {
            margin-bottom: 0.8rem;
            position: relative;
            padding-left: 28px;
        }

        .instructions p:last-child {
            margin-bottom: 0;
        }

        .instructions p::before {
            content: '✓';
            position: absolute;
            left: 0;
            top: 0;
            color: #4facfe;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 装饰元素 */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.05));
            box-shadow: 0 0 60px rgba(79, 172, 254, 0.4);
            z-index: 1;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -80px;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                padding: 1.8rem;
                width: 95%;
            }

            h1 {
                font-size: 2rem;
            }

            .camera-container {
                height: 280px;
            }

            .instructions {
                font-size: 0.9rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<!-- 装饰元素 -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
    <h1>人脸年龄检测</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status" id="status">正在初始化摄像头...</div>

    <div class="instructions">
        <p>请正对摄像头，保持面部清晰</p>
        <p>系统将实时检测您的年龄和性别</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        // 初始化摄像头
        function initCamera() {
            status.textContent = '正在打开摄像头...';

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        status.textContent = '摄像头已就绪，开始检测...';
                        startAgeDetection();
                    };
                })
                .catch(error => {
                    console.error('摄像头访问失败:', error);
                    status.textContent = '摄像头访问失败: ' + error.message;
                    status.classList.add('warning');
                });
        }

        // 开始年龄检测
        function startAgeDetection() {
            // 每秒执行一次检测
            const detectionInterval = setInterval(() => {
                // 捕获当前视频帧
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 转换为Base64图片
                const base64Image = canvas.toDataURL('image/jpeg', 0.8);
                const base64Data = base64Image.split(',')[1];

                // 调用年龄检测接口
                fetch('/detectFaceAge', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ base64String: base64Data })
                })
                    .then(response => response.json())
                    .then(result => {
                        if (result && result.age !== undefined) {
                            // 解析性别
                            const gender = result.gender === 'MALE' ? '男' : result.gender === 'FEMALE' ? '女' : '未知';
                            status.textContent = `检测成功 | 年龄：${result.age}岁 | 性别：${gender}`;
                            status.classList.remove('warning');
                            status.classList.add('success');
                        } else {
                            status.textContent = '未检测到人脸，请调整位置';
                            status.classList.remove('success');
                            status.classList.add('warning');
                        }
                    })
                    .catch(error => {
                        console.error('检测请求失败:', error);
                        status.textContent = '检测失败，请重试';
                        status.classList.add('warning');
                    });
            }, 1000);

            // 页面关闭时清理定时器
            window.onbeforeunload = () => clearInterval(detectionInterval);
        }

        // 页面加载时初始化
        initCamera();
    });
</script>
</body>
</html>
